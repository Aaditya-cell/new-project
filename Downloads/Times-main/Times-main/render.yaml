services:
  # ─── Frontend: React/Vite Static Site ───────────────────────────────────────
  - type: web
    name: times-watch
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://times-oetk.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

